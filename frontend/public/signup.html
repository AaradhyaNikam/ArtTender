<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artiverse - Artist Signup</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css?v=2">
    <style>
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 16px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            color: var(--text-secondary);
            margin: 0.5rem 0 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(0,0,0,0.2);
        }
        .upload-area:hover {
            border-color: var(--accent);
            background: rgba(139, 92, 246, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.2);
        }
        .upload-area svg {
            color: var(--accent);
            margin-bottom: 0.75rem;
        }
        .upload-area p {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .upload-area span {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body class="login-body">
    <div class="glass-panel login-card" style="max-width: 500px;">
        <div class="logo-container">
            <h2>Artist<span class="highlight">Registration</span></h2>
            <p>Join the vendor pool</p>
        </div>
        
        <form id="signupForm" enctype="multipart/form-data">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" name="name" required placeholder="Jane Doe">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" name="email" required placeholder="jane@artist.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            <div class="input-group">
                <label>Contact Info</label>
                <input type="text" id="contact_info" name="contact_info" placeholder="123-456-7890">
            </div>
            <div class="input-group">
                <label>Art Style Tags</label>
                <input type="text" id="art_style_tags" name="art_style_tags" placeholder="Mural, Sculpture, Metal">
            </div>
            
            <label style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 600; color: var(--text-primary);">Portfolio Image Proof</label>
            <div class="upload-area" onclick="document.getElementById('portfolio_image').click()">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                <p id="uploadText">Click to upload your best work</p>
                <span>PNG, JPG up to 10MB</span>
                <input type="file" id="portfolio_image" name="portfolio_image" required accept="image/*" style="display: none;" onchange="updateFileName()">
            </div>
            
            <button type="submit" class="btn-primary" id="submitBtn">Submit Registration</button>
        </form>
        
        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="index.html" style="color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; font-weight: 600; transition: color 0.2s;">&larr; Back to Login</a>
        </div>
    </div>

    <script src="js/api.js?v=3"></script>
    <script>
        function updateFileName() {
            const input = document.getElementById('portfolio_image');
            if (input.files.length > 0) {
                document.getElementById('uploadText').innerText = "✓ " + input.files[0].name;
            }
        }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = document.getElementById('signupForm');
            const formData = new FormData(form);
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "Submitting...";
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/api/auth/signup`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail || 'Signup failed');
                }
                
                alert('Registration submitted! Awaiting Admin approval.');
                window.location.href = 'index.html';
            } catch (err) {
                alert(err.message);
                submitBtn.innerText = "Submit Registration";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
